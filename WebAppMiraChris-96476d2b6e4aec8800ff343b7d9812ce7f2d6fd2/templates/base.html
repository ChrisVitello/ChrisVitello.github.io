<!-- Base of other files -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} VitelloWeb {% endblock %}</title>
    <!--Ask Flask to generate the correct URL for style.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        nav {
        border-radius: 15px;
        border: 2px solid black;
        background-color: lightblue;
        justify-content: center;
        align-items: center;
        gap: 60px;
        display: flex;
        width: 600px;
        padding: 5px 10px;
        line-height: 1;
        margin: 0 auto;
        }

        body {
        text-align: center;
        }
    </style>
</head>
<body>

<nav class = "navbar">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href = "/login">Log In</a>
    <a href = "/cart">Cart</a>
    <a>{{ role }}</a>
</nav>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
